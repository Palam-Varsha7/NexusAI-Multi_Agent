services:
  - type: web
    name: nexusai-api
    env: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: FAISS_INDEX_PATH
        value: backend/storage/faiss
      - key: ALLOWED_ORIGINS
        value: https://your-vercel-app.vercel.app,http://localhost:5173
